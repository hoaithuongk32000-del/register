name: DNSControl

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/dnscontrol.yml"
            - "dnsconfig.js"

    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.ref }}-dnscontrol

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: is-a-dev/dnscontrol-action@f496eda4e34fc2bcb6ac8b776501ee486af3dbfe # main
              with:
                  args: check
